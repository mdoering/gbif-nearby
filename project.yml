name: GBIFNearby
options:
  bundleIdPrefix: org.gbif
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  GBIFNearby:
    type: application
    platform: iOS
    sources:
      - path: GBIFNearby
    resources:
      - GBIFNearby/Resources
    info:
      path: GBIFNearby/Resources/Info.plist
      properties:
        CFBundleDisplayName: GBIF Nearby
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "GBIF Nearby uses your location to show species and datasets recorded around you."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gbif.nearby
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
  GBIFNearbyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GBIFNearbyTests
    dependencies:
      - target: GBIFNearby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gbif.nearby.tests
schemes:
  GBIFNearby:
    build:
      targets:
        GBIFNearby: all
        GBIFNearbyTests: [test]
    test:
      targets:
        - GBIFNearbyTests
