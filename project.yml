name: GBIFNearby
options:
  bundleIdPrefix: org.gbif
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: VYXAL36KB6
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  GBIFNearby:
    type: application
    platform: iOS
    sources:
      - path: GBIFNearby
    resources:
      - GBIFNearby/Resources
    info:
      path: GBIFNearby/Resources/Info.plist
      properties:
        CFBundleDisplayName: GBIF Nearby
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.education
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "GBIF Nearby uses your location to show species and datasets recorded around you."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gbif.nearby
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
      configs:
        # XcodeGen's application preset hardcodes the legacy
        # CODE_SIGN_IDENTITY = "iPhone Developer", which forces development
        # signing even for Release archives — Xcode Cloud uploads then trip
        # ITMS-90035 because the binary isn't distribution-signed. Override
        # with the modern per-config names; CODE_SIGN_STYLE: Automatic at the
        # project level handles profile selection.
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
  GBIFNearbyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GBIFNearbyTests
        excludes:
          - "Fixtures/**"
      - path: GBIFNearbyTests/Fixtures/occurrence-search.json
        buildPhase: resources
      - path: GBIFNearbyTests/Fixtures/occurrence-facet-species.json
        buildPhase: resources
    info:
      path: GBIFNearbyTests/Info.plist
    dependencies:
      - target: GBIFNearby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gbif.nearby.tests
schemes:
  GBIFNearby:
    build:
      targets:
        GBIFNearby: all
        GBIFNearbyTests: [test]
    test:
      targets:
        - GBIFNearbyTests
