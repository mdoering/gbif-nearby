name: GBIFNearby
options:
  bundleIdPrefix: org.gbif
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: VYXAL36KB6
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  GBIFNearby:
    type: application
    platform: iOS
    sources:
      - path: GBIFNearby
    resources:
      - GBIFNearby/Resources
    info:
      path: GBIFNearby/Resources/Info.plist
      properties:
        CFBundleDisplayName: GBIF Nearby
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.education
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "GBIF Nearby uses your location to show species and datasets recorded around you."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gbif.nearby
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
      configs:
        # Xcode 26's "Automatic" signing no longer performs the legacy
        # Developer -> Distribution swap on archive, so local archives kept
        # signing with the Apple Development cert and failed App Store
        # validation (ITMS-90035). Pin Release to Manual signing with the
        # Distribution cert + the App Store profile we created in the
        # developer portal. Debug stays Automatic so day-to-day dev works.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "GBIF Nearby App Store"
  GBIFNearbyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GBIFNearbyTests
        excludes:
          - "Fixtures/**"
      - path: GBIFNearbyTests/Fixtures/occurrence-search.json
        buildPhase: resources
      - path: GBIFNearbyTests/Fixtures/occurrence-facet-species.json
        buildPhase: resources
    info:
      path: GBIFNearbyTests/Info.plist
    dependencies:
      - target: GBIFNearby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.gbif.nearby.tests
schemes:
  GBIFNearby:
    build:
      targets:
        GBIFNearby: all
        GBIFNearbyTests: [test]
    test:
      targets:
        - GBIFNearbyTests
